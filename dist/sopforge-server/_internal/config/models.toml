# Runtime LLM routing: per-section endpoint/model, Ollama by default.
# "anthropic" opts that section into the Anthropic API instead of the local
# Ollama endpoint — off by default (CLAUDE.md: "Anthropic routing per section
# is a config option, default off").
#
# To use Anthropic for a section instead of Ollama:
#   1. Set anthropic = true below.
#   2. Set model to a real Anthropic model name, e.g. "claude-sonnet-5" or
#      "claude-haiku-4-5-20251001" (endpoint is ignored when anthropic=true —
#      Anthropic's API address is fixed, not configurable per-section).
#   3. Set the ANTHROPIC_API_KEY environment variable before launching the
#      server (never put the key in this file — it's never read from here).
# See USER_MANUAL.md's Configuration section for the full walkthrough.

[steps]
endpoint = "http://192.168.200.60:11434/v1"
model = "qwen3:14b"
anthropic = false

[narrative]
endpoint = "http://192.168.200.60:11434/v1"
model = "qwen3:32b"
anthropic = false
passes = 3
