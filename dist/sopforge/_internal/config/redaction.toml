# SOPForge redaction config: regex patterns run against OCR'd screenshot text
# (see src/capture/redact.py), plus a UIA-metadata heuristic for password
# fields (which never show real content as visible text, so OCR can't catch
# them — the whole element's bounding box is blurred instead).

[patterns]
email = '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
ipv4 = '\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b'

[password_heuristic]
name_contains = ["password", "passwd", "pwd", "secret", "pin"]
