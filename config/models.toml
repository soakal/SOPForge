# SOPForge model routing. Each section picks a provider (ollama / openrouter /
# openai / anthropic) and a model. API keys are read from environment variables,
# never stored here:
#   openrouter -> OPENROUTER_API_KEY   openai -> OPENAI_API_KEY
#   anthropic  -> ANTHROPIC_API_KEY
# Ollama is local & private (no key). Edit this from the tray's Configuration
# page, or here directly. The runtime copy lives at ~/SOPForge/models.toml.

[steps]
provider = "ollama"
endpoint = "http://192.168.200.60:11434/v1"
model = "qwen3:32b"

[narrative]
provider = "ollama"
endpoint = "http://192.168.200.60:11434/v1"
model = "qwen3:32b"
passes = 3

[vision]
enabled = true
provider = "ollama"
endpoint = "http://192.168.200.60:11434/v1"
model = "qwen2.5vl:7b"
